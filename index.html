<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dump Truck Activity Dashboard</title>
    <!-- Include SheetJS library for reading and writing Excel files in the browser -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
        }
        .upload-section {
            border: 2px dashed #3498db;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            background: #ecf0f1;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-section:hover {
            background: #e2e7e9;
        }
        #fileInput {
            display: none;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            display: none;
            margin-bottom: 20px;
        }
        .btn:hover {
            background-color: #27ae60;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚚 Dump Truck Activity Dashboard</h1>
    <p>Upload your daily sheet to calculate combined shifts, idle times, and export summaries.</p>
    
    <!-- Upload Area -->
    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p>Click here to upload your Dump Truck Activity Excel File</p>
        <input type="file" id="fileInput" accept=".xlsx, .xls">
    </div>

    <!-- Export Button -->
    <button class="btn" id="exportBtn">📥 Export Summary to Excel</button>

    <!-- Results Table -->
    <div class="table-responsive">
        <table id="summaryTable" style="display: none;">
            <thead>
                <tr>
                    <th>Dump Truck Plate Number</th>
                    <th>Trip</th>
                    <th>Working Hour</th>
                    <th>Idle Hour</th>
                    <th>Down Hour</th>
                    <th>Idle Reason</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data injected dynamically -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let processedData = []; // Holds data for exporting

    document.getElementById('fileInput').addEventListener('change', handleFile, false);
    document.getElementById('exportBtn').addEventListener('click', exportToExcel, false);

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            // Fetch first sheet
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            
            // Convert to array of arrays to handle multi-row headers cleanly
            const jsonRows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            
            processDumpTruckData(jsonRows);
        };
        reader.readAsArrayBuffer(file);
    }

    function processDumpTruckData(rows) {
        // Truck grouping map
        const summaryMap = {};

        // Loop rows starting from index 1 (skipping row 0 headers)
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;

            const truckPlate = row[1]; // Column B: 'Hauling DT'
            
            // Skip invalid rows, empty entries, or header repetitions
            if (!truckPlate || truckPlate === 'Hauling DT' || truckPlate === 0 || truckPlate === "0") continue;

            // Map standard column positions based on your file layout
            const dayHR = parseFloat(row[12]) || 0;     // Column M: Day HR
            const dayTrip = parseInt(row[13]) || 0;    // Column N: Day Trip
            const nightHR = parseFloat(row[14]) || 0;   // Column O: Night HR
            const nightTrip = parseInt(row[15]) || 0;  // Column P: Night Trip
            const reason = row[17] ? String(row[17]).trim() : ""; // Column R: Idle Reason

            if (!summaryMap[truckPlate]) {
                summaryMap[truckPlate] = {
                    plate: truckPlate,
                    dayHR: 0,
                    nightHR: 0,
                    trips: 0,
                    reasons: new Set()
                };
            }

            summaryMap[truckPlate].dayHR += dayHR;
            summaryMap[truckPlate].nightHR += nightHR;
            summaryMap[truckPlate].trips += (dayTrip + nightTrip);
            if (reason && reason.toUpperCase() !== 'NONE') {
                summaryMap[truckPlate].reasons.add(reason);
            }
        }

        // Apply formulas and prepare output array
        processedData = Object.values(summaryMap).map(truck => {
            const work = truck.dayHR + truck.nightHR;
            let idle = 20 - work;
            if (idle < 0) idle = 0; // Prevent negative values

            return {
                "Dump Truck Plate Number": truck.plate,
                "Trip": truck.trips,
                "Working Hour": Math.round(work * 100) / 100,
                "Idle Hour": Math.round(idle * 100) / 100,
                "Down Hour": 0,
                "Idle Reason": truck.reasons.size > 0 ? Array.from(truck.reasons).join(", ") : "None"
            };
        });

        renderTable(processedData);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; // Clear old results

        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${item["Dump Truck Plate Number"]}</b></td>
                <td>${item["Trip"]}</td>
                <td>${item["Working Hour"]}</td>
                <td>${item["Idle Hour"]}</td>
                <td>${item["Down Hour"]}</td>
                <td>${item["Idle Reason"]}</td>
            `;
            tbody.appendChild(tr);
        });

        // Show table and export button
        document.getElementById('summaryTable').style.display = "table";
        document.getElementById('exportBtn').style.display = "inline-block";
    }

    function exportToExcel() {
        if (processedData.length === 0) return;
        
        const worksheet = XLSX.utils.json_to_sheet(processedData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Summary Report");
        
        // Triggers automatic download of the Excel summary sheet
        XLSX.writeFile(workbook, "Dump_Truck_Summary_Report.xlsx");
    }
</script>

</body>
</html>
